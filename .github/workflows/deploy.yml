name: Deploy to BigRock (FTP/Static)

on:
  push:
    branches: [ main ]

env:
  # Opt into Node.js 24 to silence deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Upgraded to latest Node
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project (Static Export)
        run: npm run build

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ./public_html/
          # 'dangerous-clean-slate' is the correct name for deleting old files, 
          # but we set it to false to be safe.
          dangerous-clean-slate: false 
