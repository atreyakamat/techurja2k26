[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  # Note: Global 'timeout' property is not supported at the top level of [functions].
  # Function-specific timeouts are managed via Next.js 'maxDuration' in the route handlers.
