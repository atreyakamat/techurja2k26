[build]
  command = "prisma generate && next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Force standard Prisma client
  PRISMA_GENERATE_DATAPROXY = "false"
  PRISMA_SKIP_POSTINSTALL_GENERATE = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@prisma/client", "prisma"]
  # Include library engines for direct MySQL connection
  included_files = ["node_modules/.prisma/client/*.node", "prisma/schema.prisma"]
